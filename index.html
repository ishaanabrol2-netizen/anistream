<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniStream Infinity</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{

background:
radial-gradient(
circle at top,
#1a1a1a,
#050505 55%
);

color:white;
overflow-x:hidden;

}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#ff7a00;
border-radius:20px;
}

/* =========================
TOPBAR
========================= */

.topbar{

position:fixed;

top:0;
left:0;
right:0;

padding:18px 28px;

display:flex;
justify-content:space-between;
align-items:center;

background:
rgba(8,8,8,0.55);

backdrop-filter:blur(18px);

border-bottom:
1px solid rgba(255,255,255,0.06);

z-index:999;

box-shadow:
0 10px 40px rgba(0,0,0,0.4);

}

.logo{

font-size:40px;
font-weight:900;

letter-spacing:-2px;

}

.logo span{
color:#ff7a00;
}

.nav{

display:flex;
align-items:center;
gap:12px;

}

.search{

width:250px;

padding:14px 18px;

border:none;
outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.08);

color:white;

}

.search::placeholder{
color:#aaa;
}

.nav-btn{

padding:12px 18px;

border:none;

border-radius:16px;

background:
rgba(255,255,255,0.05);

border:
1px solid rgba(255,255,255,0.08);

color:white;

cursor:pointer;

transition:0.3s ease;

}

.nav-btn:hover{

transform:
translateY(-3px);

background:
rgba(255,255,255,0.1);

}

.login-btn{

padding:13px 22px;

border:none;

border-radius:16px;

background:
linear-gradient(
135deg,
#ff7a00,
#ff5500
);

color:white;

font-weight:700;

cursor:pointer;

transition:0.3s ease;

}

.login-btn:hover{

transform:
translateY(-4px)
scale(1.03);

}

/* =========================
SEARCH PANEL
========================= */

#searchPanel{

display:none;

margin:
100px 20px 0;

}

/* =========================
MAIN HERO
========================= */

.hero{

padding:
100px 20px 30px;

display:grid;

grid-template-columns:
1fr 320px;

gap:20px;

}

/* =========================
LEFT
========================= */

.left{

display:flex;
flex-direction:column;
gap:20px;

}

/* =========================
FEATURED HERO
========================= */

.featured-banner{

position:relative;

height:560px;

border-radius:34px;

overflow:hidden;

display:flex;
align-items:flex-end;

background:#111;

border:
1px solid rgba(255,255,255,0.08);

box-shadow:
0 25px 80px rgba(0,0,0,0.7);

}

.featured-backdrop{

position:absolute;
inset:0;

width:100%;
height:100%;

object-fit:cover;

filter:
brightness(0.5);

transform:scale(1.05);

}

.featured-overlay{

position:absolute;
inset:0;

background:
linear-gradient(
to right,
rgba(0,0,0,0.96),
rgba(0,0,0,0.65),
transparent
);

z-index:1;

}

.featured-content{

position:relative;
z-index:2;

padding:50px;

max-width:700px;

}

.badge{

display:inline-flex;
align-items:center;
gap:10px;

padding:10px 18px;

border-radius:30px;

background:
rgba(255,122,0,0.15);

border:
1px solid rgba(255,122,0,0.25);

margin-bottom:22px;

font-size:13px;
font-weight:700;

}

.featured-content h1{

font-size:92px;

line-height:0.9;

font-weight:900;

letter-spacing:-5px;

margin-bottom:18px;

}

.featured-content p{

font-size:16px;

line-height:1.9;

color:#ddd;

margin-bottom:24px;

max-width:650px;

}

.featured-meta{

display:flex;
gap:12px;

flex-wrap:wrap;

margin-bottom:28px;

}

.featured-meta span{

padding:10px 16px;

border-radius:16px;

background:
rgba(255,255,255,0.08);

border:
1px solid rgba(255,255,255,0.06);

font-size:13px;

}

.buttons{

display:flex;
gap:14px;

}

.watch-btn{

padding:15px 26px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#ff7a00,
#ff5500
);

color:white;

font-weight:700;

cursor:pointer;

transition:0.3s ease;

}

.watch-btn:hover{

transform:
translateY(-5px);

box-shadow:
0 10px 30px rgba(255,122,0,0.35);

}

.secondary-btn{

padding:15px 24px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.08);

border:
1px solid rgba(255,255,255,0.08);

color:white;

cursor:pointer;

transition:0.3s ease;

}

.secondary-btn:hover{

transform:
translateY(-5px);

}

/* =========================
PANELS
========================= */

.panel{

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(10px);

border-radius:28px;

padding:20px;

overflow:hidden;

}

.section-title{

font-size:24px;
font-weight:800;

margin-bottom:18px;

}

/* =========================
ROWS
========================= */

.airing-row,
.anime-row,
.search-row{

display:flex;
gap:16px;

overflow-x:auto;

padding-bottom:10px;

scrollbar-width:none;

}

.airing-row::-webkit-scrollbar,
.anime-row::-webkit-scrollbar,
.search-row::-webkit-scrollbar{
display:none;
}

/* =========================
AIRING CARD
========================= */

.airing-card{

min-width:220px;
height:110px;

display:flex;

border-radius:22px;

overflow:hidden;

background:
rgba(255,255,255,0.04);

cursor:pointer;

transition:0.3s ease;

border:
1px solid rgba(255,255,255,0.05);

}

.airing-card:hover{

transform:
translateY(-6px);

background:
rgba(255,255,255,0.08);

}

.airing-card img{

width:80px;
height:100%;

object-fit:cover;

}

.airing-details{

padding:12px;

}

.airing-details h3{

font-size:12px;

line-height:1.5;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.airing-details p{

font-size:10px;
color:#ccc;

margin-top:6px;

}

.ep-badge{

margin-top:8px;

padding:6px 10px;

border-radius:12px;

background:
rgba(255,122,0,0.15);

font-size:10px;
font-weight:700;

width:max-content;

}

/* =========================
ANIME CARD
========================= */

.card{

min-width:190px;
height:280px;

border-radius:28px;

overflow:hidden;

position:relative;

cursor:pointer;

flex-shrink:0;

transition:0.35s ease;

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

}

.card:hover{

transform:
translateY(-10px)
scale(1.04);

box-shadow:
0 15px 45px rgba(255,122,0,0.22);

}

.card img{

width:100%;
height:100%;

object-fit:cover;

transition:0.4s ease;

}

.card:hover img{

transform:scale(1.08);

}

.card::after{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,0.98),
transparent 60%
);

}

.top-rank{

position:absolute;

left:-10px;
bottom:-20px;

font-size:120px;

font-weight:900;

color:
rgba(255,255,255,0.08);

z-index:1;

}

.score{

position:absolute;

top:12px;
right:12px;

padding:6px 10px;

border-radius:14px;

background:
rgba(0,0,0,0.55);

font-size:11px;
font-weight:700;

z-index:5;

}

.love{

position:absolute;

top:12px;
left:12px;

padding:6px 10px;

border-radius:14px;

background:
rgba(255,0,80,0.18);

font-size:11px;
font-weight:700;

z-index:5;

}

.play-btn{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

width:58px;
height:58px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(0,0,0,0.45);

backdrop-filter:blur(8px);

font-size:20px;

opacity:0;

z-index:5;

transition:0.3s ease;

}

.card:hover .play-btn{

opacity:1;

}

.card-info{

position:absolute;

left:14px;
bottom:14px;

z-index:5;

}

.card-info h3{

font-size:14px;

line-height:1.4;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.card-info p{

font-size:11px;
color:#ccc;

margin-top:4px;

}

/* =========================
RIGHT PANEL
========================= */

.right{

position:sticky;

top:90px;

height:max-content;

}

.trending-list{

display:flex;
flex-direction:column;
gap:12px;

}

.trend-item{

display:flex;
align-items:center;

gap:12px;

padding:12px;

border-radius:20px;

background:
rgba(255,255,255,0.04);

cursor:pointer;

transition:0.3s ease;

border:
1px solid rgba(255,255,255,0.05);

}

.trend-item:hover{

transform:
translateX(6px);

background:
rgba(255,255,255,0.08);

}

.rank{

font-size:22px;
font-weight:900;

color:#ff7a00;

width:36px;

}

.trend-thumb{

width:54px;
height:70px;

border-radius:14px;

overflow:hidden;

flex-shrink:0;

}

.trend-thumb img{

width:100%;
height:100%;

object-fit:cover;

}

.trend-info{

flex:1;

overflow:hidden;

}

.trend-info h3{

font-size:11px;

line-height:1.4;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.trend-info p{

font-size:10px;
color:#ccc;

margin-top:4px;

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:1300px){

.hero{
grid-template-columns:1fr;
}

.right{
position:relative;
top:0;
}

}

@media(max-width:900px){

.hero{
padding:90px 12px 20px;
}

.featured-banner{
height:480px;
}

.featured-content{
padding:30px;
}

.featured-content h1{
font-size:56px;
}

.search{
display:none;
}

.nav-btn{
display:none;
}

.topbar{
padding:18px 12px;
}

.card{
min-width:160px;
height:240px;
}

}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">
Ani<span>Stream</span>
</div>

<div class="nav">

<input
type="text"
class="search"
id="searchInput"
placeholder="Search anime..."
>

<button class="nav-btn">
Trending
</button>

<button class="nav-btn">
Movies
</button>

<button class="nav-btn">
Favorites
</button>

<button class="login-btn">
Login
</button>

</div>

</div>

<!-- SEARCH PANEL -->

<div class="panel"
id="searchPanel">

<div class="section-title">
🔍 Search Results
</div>

<div class="search-row"
id="searchResults">

</div>

</div>

<!-- MAIN -->

<section class="hero">

<!-- LEFT -->

<div class="left">

<!-- FEATURED -->

<div class="featured-banner">

<img
id="featuredBackdrop"
class="featured-backdrop"
src=""
>

<div class="featured-overlay"></div>

<div class="featured-content">

<div class="badge">
🔥 #1 GLOBAL TRENDING
</div>

<h1 id="featuredTitle">
Loading...
</h1>

<p id="featuredDesc">
Loading anime description...
</p>

<div class="featured-meta">

<span id="featuredScore">
⭐ 9.0
</span>

<span id="featuredType">
TV
</span>

<span id="featuredEpisodes">
24 Episodes
</span>

</div>

<div class="buttons">

<button
class="watch-btn"
id="watchFeatured">

▶ Watch Now

</button>

<button class="secondary-btn">

＋ My List

</button>

</div>

</div>

</div>

<!-- AIRING TODAY -->

<div class="panel">

<div class="section-title">
📅 Airing Today
</div>

<div class="airing-row"
id="airingRow">

</div>

</div>

<!-- TRENDING -->

<div class="panel">

<div class="section-title">
🎬 Trending Anime
</div>

<div class="anime-row"
id="animeRow">

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<div class="panel">

<div class="section-title">
🔥 Real-Time Trending
</div>

<div class="trending-list"
id="trendingList">

</div>

</div>

</div>

</section>

<script>

/* =========================
LIVE FEATURED ROTATION
========================= */

let featuredIndex = 0;
let featuredAnime = [];

/* =========================
ELEMENTS
========================= */

const animeRow =
document.getElementById("animeRow");

const airingRow =
document.getElementById("airingRow");

const trendingList =
document.getElementById("trendingList");

/* FEATURED */

const featuredBackdrop =
document.getElementById("featuredBackdrop");

const featuredTitle =
document.getElementById("featuredTitle");

const featuredDesc =
document.getElementById("featuredDesc");

const featuredScore =
document.getElementById("featuredScore");

const featuredType =
document.getElementById("featuredType");

const featuredEpisodes =
document.getElementById("featuredEpisodes");

const watchFeatured =
document.getElementById("watchFeatured");

/* =========================
CREATE CARD
========================= */

function createAnimeCard(anime,index){

const loves =
Math.floor(
Math.random() * 900
) + 100;

const card =
document.createElement("div");

card.classList.add("card");

card.innerHTML = `

<div class="top-rank">
${String(index + 1).padStart(2,'0')}
</div>

<img
loading="lazy"
src="${anime.images.jpg.large_image_url}"
>

<div class="love">
❤️ ${loves}K
</div>

<div class="score">
⭐ ${anime.score || "N/A"}
</div>

<div class="play-btn">
▶
</div>

<div class="card-info">

<h3>
${anime.title}
</h3>

<p>
${anime.type || "TV"}
</p>

</div>

`;

card.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

return card;

}

/* =========================
UPDATE FEATURED
========================= */

function updateFeatured(){

const anime =
featuredAnime[featuredIndex];

featuredBackdrop.src =
anime.images.jpg.large_image_url;

featuredTitle.innerHTML =
anime.title;

featuredDesc.innerHTML =
anime.synopsis
? anime.synopsis.slice(0,180) + "..."
: "No description available.";

featuredScore.innerHTML =
`⭐ ${anime.score || "N/A"}`;

featuredType.innerHTML =
anime.type || "TV";

featuredEpisodes.innerHTML =
`${anime.episodes || "??"} Episodes`;

watchFeatured.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

}

/* =========================
LOAD ANIME
========================= */

async function loadAnime(){

try{

const topRes = await fetch(
"https://api.jikan.moe/v4/top/anime?limit=12"
);

const topData = await topRes.json();

const airingRes = await fetch(
"https://api.jikan.moe/v4/seasons/now"
);

const airingData = await airingRes.json();

/* FEATURED */

featuredAnime =
topData.data;

updateFeatured();

setInterval(()=>{

featuredIndex++;

if(featuredIndex >= featuredAnime.length){

featuredIndex = 0;

}

updateFeatured();

},8000);

/* TRENDING */

topData.data.forEach((anime,index)=>{

animeRow.appendChild(
createAnimeCard(anime,index)
);

});

/* AIRING */

airingData.data.slice(0,6).forEach((anime)=>{

const card =
document.createElement("div");

card.classList.add("airing-card");

card.innerHTML = `

<img
loading="lazy"
src="${anime.images.jpg.large_image_url}"
>

<div class="airing-details">

<h3>
${anime.title}
</h3>

<p>
${anime.broadcast?.time || "Today"}
</p>

<div class="ep-badge">

EP ${anime.episodes || "??"}

</div>

</div>

`;

card.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

airingRow.appendChild(card);

});

/* RIGHT TRENDING */

topData.data.forEach((anime,index)=>{

const item =
document.createElement("div");

item.classList.add("trend-item");

item.innerHTML = `

<div class="rank">
${String(index + 1).padStart(2,'0')}
</div>

<div class="trend-thumb">

<img
loading="lazy"
src="${anime.images.jpg.large_image_url}"
>

</div>

<div class="trend-info">

<h3>
${anime.title}
</h3>

<p>
⭐ ${anime.score || "N/A"}
</p>

</div>

`;

item.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

trendingList.appendChild(item);

});

}catch(error){

console.log(error);

}

}

loadAnime();

/* =========================
SEARCH
========================= */

const searchInput =
document.getElementById("searchInput");

const searchPanel =
document.getElementById("searchPanel");

const searchResults =
document.getElementById("searchResults");

searchInput.addEventListener("input",async()=>{

const query =
searchInput.value.trim();

if(query.length < 2){

searchPanel.style.display =
"none";

return;

}

const response = await fetch(
`https://api.jikan.moe/v4/anime?q=${query}&limit=8`
);

const data =
await response.json();

searchResults.innerHTML = "";

searchPanel.style.display =
"block";

data.data.forEach((anime,index)=>{

searchResults.appendChild(
createAnimeCard(anime,index)
);

});

});

</script>

</body>

</html>
