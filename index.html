
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniStream Infinity</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{

background:#040404;
color:white;
overflow-x:hidden;

}

/* =========================
BACKGROUND
========================= */

.bg-video{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

z-index:-10;

filter:
brightness(0.14)
contrast(1.1)
saturate(1.2);

transform:scale(1.08);

}

.overlay{

position:fixed;
inset:0;

background:

linear-gradient(
to right,
rgba(0,0,0,0.95),
rgba(0,0,0,0.78),
rgba(0,0,0,0.45)
),

linear-gradient(
to top,
rgba(0,0,0,1),
transparent 45%
);

z-index:-9;

}

/* =========================
GLOW EFFECTS
========================= */

.glow1{

position:fixed;

width:600px;
height:600px;

background:#ff7a00;

top:-220px;
right:-220px;

filter:blur(180px);

opacity:0.14;

border-radius:50%;

z-index:-7;

}

.glow2{

position:fixed;

width:500px;
height:500px;

background:#ff0000;

left:-180px;
bottom:-180px;

filter:blur(180px);

opacity:0.08;

border-radius:50%;

z-index:-7;

}

/* =========================
MOUSE GLOW
========================= */

.mouse-glow{

position:fixed;

width:420px;
height:420px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(255,122,0,0.15),
transparent 70%
);

pointer-events:none;

transform:
translate(-50%,-50%);

filter:blur(25px);

z-index:-5;

}

/* =========================
TOPBAR
========================= */

.topbar{

position:fixed;

top:0;
left:0;
right:0;

padding:18px 24px;

display:flex;
justify-content:space-between;
align-items:center;

backdrop-filter:blur(18px);

z-index:999;

}

/* =========================
LOGO
========================= */

.logo{

font-size:38px;
font-weight:800;

letter-spacing:-2px;

}

.logo span{
color:#ff7a00;
}

/* =========================
NAV
========================= */

.nav{

display:flex;
align-items:center;
gap:12px;

}

.search{

width:240px;

padding:13px 16px;

border:none;
outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.05);

border:
1px solid rgba(255,255,255,0.06);

color:white;

}

.nav-btn{

padding:12px 18px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

color:white;

cursor:pointer;

transition:0.3s ease;

}

.nav-btn:hover{

background:
rgba(255,255,255,0.08);

transform:translateY(-3px);

}

.login-btn{

padding:12px 20px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
rgba(255,122,0,0.45),
rgba(255,122,0,0.18)
);

border:
1px solid rgba(255,122,0,0.3);

color:white;

font-weight:700;

cursor:pointer;

transition:0.3s ease;

}

.login-btn:hover{

transform:
translateY(-3px)
scale(1.03);

}

/* =========================
HERO
========================= */

.hero{

padding:
110px 20px 30px;

}

.hero-content{

max-width:720px;

margin-bottom:28px;

}

.badge{

display:inline-flex;
align-items:center;
gap:10px;

padding:10px 18px;

border-radius:30px;

background:
rgba(255,122,0,0.12);

border:
1px solid rgba(255,122,0,0.22);

margin-bottom:20px;

font-size:13px;
font-weight:600;

}

.hero h1{

font-size:78px;

line-height:0.9;

font-weight:800;

letter-spacing:-4px;

margin-bottom:20px;

}

.desc{

font-size:15px;

line-height:1.9;

color:#ddd;

max-width:620px;

}

/* =========================
LIVE BOX
========================= */

.live-box{

display:flex;
align-items:center;
gap:12px;

margin-top:22px;

padding:12px 18px;

border-radius:18px;

background:
rgba(255,0,0,0.08);

border:
1px solid rgba(255,0,0,0.18);

width:max-content;

}

.live-dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff2d2d;

animation:pulse 1.2s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.5);
opacity:0.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* =========================
BUTTONS
========================= */

.buttons{

display:flex;
gap:14px;

margin-top:24px;

}

.watch-btn{

padding:16px 32px;

border:none;

border-radius:22px;

background:
linear-gradient(
135deg,
rgba(255,122,0,0.45),
rgba(255,122,0,0.2)
);

border:
1px solid rgba(255,122,0,0.3);

color:white;

font-size:16px;
font-weight:700;

cursor:pointer;

transition:0.3s ease;

}

.watch-btn:hover{

transform:
translateY(-4px)
scale(1.03);

}

/* =========================
SEARCH RESULTS
========================= */

.search-panel{

display:none;

margin-bottom:18px;

}

/* =========================
MAIN GRID
========================= */

.main-grid{

display:grid;

grid-template-columns:
1fr 300px;

gap:18px;

align-items:start;

}

/* =========================
LEFT CONTENT
========================= */

.left-content{

display:flex;
flex-direction:column;
gap:18px;

min-width:0;

}

/* =========================
RIGHT TRENDING
========================= */

.right-trending{

position:sticky;

top:90px;

}

/* =========================
PANELS
========================= */

.panel{

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(18px);

border-radius:24px;

padding:16px;

overflow:hidden;

}

/* =========================
SECTION TITLE
========================= */

.section-title{

font-size:18px;
font-weight:700;

margin-bottom:14px;

}

/* =========================
ROWS
========================= */

.airing-row,
.anime-row,
.search-row{

display:flex;
gap:12px;

overflow-x:auto;

padding-bottom:8px;

scrollbar-width:none;

}

.airing-row::-webkit-scrollbar,
.anime-row::-webkit-scrollbar,
.search-row::-webkit-scrollbar{
display:none;
}

/* =========================
AIRING CARD
========================= */

.airing-card{

min-width:170px;
height:90px;

display:flex;

border-radius:18px;

overflow:hidden;

background:
rgba(255,255,255,0.03);

flex-shrink:0;

transition:0.3s ease;

}

.airing-card:hover{

transform:
translateY(-6px);

}

.airing-card img{

width:62px;
height:100%;

object-fit:cover;

}

.airing-details{

padding:10px;

overflow:hidden;

}

.airing-details h3{

font-size:11px;

line-height:1.4;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.airing-details p{

font-size:10px;
color:#ccc;

margin-top:4px;

}

.ep-badge{

margin-top:6px;

padding:4px 8px;

border-radius:10px;

background:
rgba(255,122,0,0.12);

font-size:9px;
font-weight:700;

width:max-content;

}

/* =========================
ANIME CARDS
========================= */

.card{

min-width:145px;
height:220px;

border-radius:22px;

overflow:hidden;

position:relative;

cursor:pointer;

flex-shrink:0;

background:
rgba(255,255,255,0.03);

transition:
transform 0.25s ease,
box-shadow 0.3s ease;

}

.card:hover{

transform:
translateY(-8px)
scale(1.03);

box-shadow:
0 18px 40px rgba(0,0,0,0.45);

}

.card img{

width:100%;
height:100%;

object-fit:cover;

transition:0.4s ease;

}

.card:hover img{

transform:scale(1.08);

}

.card::after{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,0.96),
transparent 60%
);

}

.love{

position:absolute;

top:8px;
left:8px;

padding:4px 8px;

border-radius:12px;

background:
rgba(255,0,80,0.18);

font-size:9px;
font-weight:700;

z-index:5;

}

.score{

position:absolute;

top:8px;
right:8px;

padding:4px 8px;

border-radius:12px;

background:
rgba(0,0,0,0.45);

font-size:9px;
font-weight:700;

z-index:5;

}

.play-btn{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

width:44px;
height:44px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(0,0,0,0.45);

font-size:16px;

opacity:0;

z-index:5;

transition:0.3s ease;

}

.card:hover .play-btn{

opacity:1;

}

.card-info{

position:absolute;

left:10px;
bottom:10px;

z-index:5;

}

.card-info h3{

font-size:12px;

line-height:1.4;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.card-info p{

font-size:10px;
color:#ccc;

margin-top:2px;

}

/* =========================
TRENDING LIST
========================= */

.trending-list{

display:flex;
flex-direction:column;

gap:10px;

}

.trend-item{

display:flex;
align-items:center;

gap:10px;

padding:10px;

border-radius:18px;

background:
rgba(255,255,255,0.03);

border:
1px solid rgba(255,255,255,0.04);

cursor:pointer;

transition:0.3s ease;

}

.trend-item:hover{

transform:
translateX(6px);

background:
rgba(255,255,255,0.06);

}

.rank{

font-size:18px;
font-weight:800;

color:#ff7a00;

width:28px;

}

.trend-thumb{

width:48px;
height:62px;

border-radius:12px;

overflow:hidden;

flex-shrink:0;

}

.trend-thumb img{

width:100%;
height:100%;

object-fit:cover;

}

.trend-info{

flex:1;

overflow:hidden;

}

.trend-info h3{

font-size:10px;

line-height:1.4;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.trend-info p{

font-size:9px;
color:#ccc;

margin-top:4px;

}

.trend-score{

padding:4px 6px;

border-radius:10px;

background:
rgba(255,122,0,0.14);

font-size:9px;
font-weight:700;

}

/* =========================
TRAILER MODAL
========================= */

.trailer-modal{

position:fixed;
inset:0;

background:
rgba(0,0,0,0.94);

display:none;

justify-content:center;
align-items:center;

z-index:999999;

}

.video-box{

width:80%;
height:80%;

border-radius:24px;

overflow:hidden;

position:relative;

background:black;

}

.video-box iframe{

width:100%;
height:100%;

border:none;

}

.close-btn{

position:absolute;

top:18px;
right:18px;

width:46px;
height:46px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(255,255,255,0.1);

font-size:22px;

cursor:pointer;

z-index:10;

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:1300px){

.main-grid{

grid-template-columns:
1fr;

}

.right-trending{

position:relative;

top:0;

}

}

@media(max-width:900px){

.hero{

padding:
100px 12px 20px;

}

.hero h1{

font-size:54px;

}

.logo{

font-size:32px;

}

.search{
display:none;
}

.nav-btn{
display:none;
}

.topbar{

padding:18px 12px;

}

}

</style>

</head>

<body>

<!-- VIDEO BG -->

<video
autoplay
muted
loop
playsinline
class="bg-video">

<source
src="https://cdn.coverr.co/videos/coverr-clouds-and-sunset-1560083032732?download=1080p"
type="video/mp4">

</video>

<div class="overlay"></div>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="mouse-glow" id="mouseGlow"></div>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">
Ani<span>Stream</span>
</div>

<div class="nav">

<input
type="text"
class="search"
placeholder="Search anime..."
id="searchInput">

<button class="nav-btn">
Trending
</button>

<button class="nav-btn">
Movies
</button>

<button class="nav-btn">
Favorites
</button>

<button class="login-btn">
Login
</button>

</div>

</div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<div class="badge">
🔥 REAL-TIME ANIME STREAMING
</div>

<h1>
Anime<br>
Universe
</h1>

<div class="desc">

Real anime posters, trailers, airing schedules, streaming previews, search system, and live trending anime powered from real anime APIs.

</div>

<div class="live-box">

<div class="live-dot"></div>

<div id="liveCount">
24,821 watching now
</div>

</div>

<div class="buttons">

<button class="watch-btn">
▶ Explore Anime
</button>

</div>

</div>

<!-- SEARCH RESULTS -->

<div class="panel search-panel" id="searchPanel">

<div class="section-title">
🔎 Search Results
</div>

<div class="search-row" id="searchResults">

</div>

</div>

<!-- MAIN GRID -->

<div class="main-grid">

<!-- LEFT -->

<div class="left-content">

<!-- AIRING -->

<div class="panel">

<div class="section-title">
📅 Airing Today
</div>

<div class="airing-row" id="airingRow">

</div>

</div>

<!-- TRENDING -->

<div class="panel">

<div class="section-title">
🎬 Trending Anime
</div>

<div class="anime-row" id="animeRow">

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right-trending">

<div class="panel">

<div class="section-title">
🔥 Real-Time Trending
</div>

<div class="trending-list" id="trendingList">

</div>

</div>

</div>

</div>

</section>

<!-- TRAILER -->

<div class="trailer-modal" id="trailerModal">

<div class="video-box">

<div class="close-btn" id="closeBtn">
✕
</div>

<iframe
id="trailerFrame"
allowfullscreen>

</iframe>

</div>

</div>

<script>

/* =========================
LIVE COUNT
========================= */

const liveCount =
document.getElementById("liveCount");

function updateViewers(){

const viewers =
Math.floor(
Math.random() * 10000
) + 20000;

liveCount.innerHTML =
`${viewers.toLocaleString()} watching now`;

}

setInterval(updateViewers,3000);

/* =========================
MOUSE GLOW
========================= */

const mouseGlow =
document.getElementById("mouseGlow");

document.addEventListener("mousemove",(e)=>{

mouseGlow.style.left =
`${e.clientX}px`;

mouseGlow.style.top =
`${e.clientY}px`;

});

/* =========================
ELEMENTS
========================= */

const animeRow =
document.getElementById("animeRow");

const airingRow =
document.getElementById("airingRow");

const trendingList =
document.getElementById("trendingList");

const trailerModal =
document.getElementById("trailerModal");

const trailerFrame =
document.getElementById("trailerFrame");

const closeBtn =
document.getElementById("closeBtn");

/* =========================
CREATE CARD
========================= */

function createAnimeCard(anime){

const loves =
Math.floor(
Math.random() * 900
) + 100;

const card =
document.createElement("div");

card.classList.add("card");

card.innerHTML = `

<img src="${anime.images.jpg.large_image_url}">

<div class="love">
❤️ ${loves}K
</div>

<div class="score">
⭐ ${anime.score || "N/A"}
</div>

<div class="play-btn">
▶
</div>

<div class="card-info">

<h3>
${anime.title}
</h3>

<p>
${anime.type || "TV"}
</p>

</div>

`;

card.onclick = ()=>{

if(anime.trailer?.embed_url){

trailerModal.style.display =
"flex";

trailerFrame.src =
anime.trailer.embed_url;

}

};

return card;

}

/* =========================
LOAD DATA
========================= */

async function loadAnime(){

animeRow.innerHTML = "";
airingRow.innerHTML = "";
trendingList.innerHTML = "";

const topRes = await fetch(
"https://api.jikan.moe/v4/top/anime?limit=18"
);

const topData = await topRes.json();

const airingRes = await fetch(
"https://api.jikan.moe/v4/seasons/now"
);

const airingData = await airingRes.json();

/* TRENDING */

topData.data.forEach((anime)=>{

animeRow.appendChild(
createAnimeCard(anime)
);

});

/* AIRING */

airingData.data.slice(0,12).forEach((anime)=>{

const card =
document.createElement("div");

card.classList.add("airing-card");

card.innerHTML = `

<img src="${anime.images.jpg.large_image_url}">

<div class="airing-details">

<h3>
${anime.title}
</h3>

<p>
${anime.broadcast?.time || "Today"}
</p>

<div class="ep-badge">

EP ${anime.episodes || "??"}

</div>

</div>

`;

card.onclick = ()=>{

if(anime.trailer?.embed_url){

trailerModal.style.display =
"flex";

trailerFrame.src =
anime.trailer.embed_url;

}

};

airingRow.appendChild(card);

});

/* RIGHT TRENDING */

topData.data.slice(0,10).forEach((anime,index)=>{

const item =
document.createElement("div");

item.classList.add("trend-item");

item.innerHTML = `

<div class="rank">
${String(index + 1).padStart(2,'0')}
</div>

<div class="trend-thumb">

<img src="${anime.images.jpg.large_image_url}">

</div>

<div class="trend-info">

<h3>
${anime.title}
</h3>

<p>
⭐ ${anime.score || "N/A"}
</p>

</div>

<div class="trend-score">

#${anime.rank}

</div>

`;

item.onclick = ()=>{

if(anime.trailer?.embed_url){

trailerModal.style.display =
"flex";

trailerFrame.src =
anime.trailer.embed_url;

}

};

trendingList.appendChild(item);

});

}

loadAnime();

/* =========================
SEARCH SYSTEM
========================= */

const searchInput =
document.getElementById("searchInput");

const searchPanel =
document.getElementById("searchPanel");

const searchResults =
document.getElementById("searchResults");

searchInput.addEventListener("input", async ()=>{

const query =
searchInput.value.trim();

if(query.length < 2){

searchPanel.style.display =
"none";

return;

}

const response = await fetch(
`https://api.jikan.moe/v4/anime?q=${query}&limit=12`
);

const data = await response.json();

searchResults.innerHTML = "";

searchPanel.style.display =
"block";

data.data.forEach((anime)=>{

searchResults.appendChild(
createAnimeCard(anime)
);

});

});

/* =========================
CLOSE TRAILER
========================= */

closeBtn.onclick = ()=>{

trailerModal.style.display =
"none";

trailerFrame.src = "";

};

<script src="script.js"></script>  

</body>


</html>
