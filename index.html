<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniStream X</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
overflow:hidden;
color:white;
}

/* VIDEO BACKGROUND */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
filter:brightness(0.45);
}

.overlay{
position:fixed;
inset:0;
background:
linear-gradient(to right,rgba(0,0,0,0.92),rgba(0,0,0,0.2)),
linear-gradient(to top,rgba(0,0,0,0.95),transparent);
z-index:-2;
}

/* NAVBAR */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
backdrop-filter:blur(10px);
background:rgba(0,0,0,0.2);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:42px;
font-weight:800;
letter-spacing:2px;
}

.logo span{
color:#ff7a00;
}

nav{
display:flex;
gap:14px;
align-items:center;
}

.nav-btn{
padding:12px 18px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);
color:white;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

.nav-btn:hover{
background:#ff7a00;
transform:translateY(-2px);
}

.search{
width:240px;
padding:12px 18px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.05);
color:white;
border:1px solid rgba(255,255,255,0.08);
}

/* MAIN */

.main{
height:100vh;
display:flex;
align-items:center;
padding:0 80px;
position:relative;
}

.content{
max-width:760px;
animation:fade 1s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

.tag{
display:inline-block;
padding:8px 18px;
border-radius:30px;
background:#ff7a00;
font-size:14px;
font-weight:600;
margin-bottom:25px;
box-shadow:0 0 30px rgba(255,122,0,0.6);
}

.title{
font-size:110px;
line-height:0.95;
font-weight:800;
margin-bottom:25px;
text-shadow:0 10px 40px rgba(0,0,0,0.8);
}

.meta{
display:flex;
gap:20px;
margin-bottom:25px;
font-size:15px;
color:#ddd;
}

.desc{
font-size:18px;
line-height:1.9;
color:#ddd;
max-width:680px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:18px;
margin-top:40px;
}

.watch-btn{
padding:18px 42px;
border:none;
border-radius:16px;
background:#ff7a00;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 40px rgba(255,122,0,0.5);
}

.watch-btn:hover{
transform:scale(1.06);
background:#ff9500;
}

.secondary-btn{
padding:18px 30px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);
color:white;
font-size:18px;
cursor:pointer;
backdrop-filter:blur(10px);
}

/* FLOATING CARDS */

.cards{
position:absolute;
right:70px;
bottom:50px;
display:flex;
gap:22px;
}

.card{
width:250px;
height:150px;
border-radius:24px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:0.35s;
border:2px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-12px) scale(1.03);
border-color:#ff7a00;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
opacity:0.72;
}

.card::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

.number{
position:absolute;
left:18px;
bottom:12px;
font-size:42px;
font-weight:800;
z-index:2;
}

.card-title{
position:absolute;
right:18px;
bottom:18px;
font-size:15px;
font-weight:600;
z-index:2;
}

/* GLOW */

.glow{
position:absolute;
width:600px;
height:600px;
background:#ff7a00;
filter:blur(180px);
opacity:0.12;
top:-100px;
right:-100px;
border-radius:50%;
z-index:-1;
}

/* MOBILE */

@media(max-width:1000px){

.cards{
display:none;
}

.title{
font-size:62px;
}

.main{
padding:0 25px;
}

header{
padding:18px 20px;
}

nav{
display:none;
}

}

</style>

</head>

<body>

<video autoplay muted loop class="bg-video">

<source
src="https://cdn.coverr.co/videos/coverr-anime-style-landscape-1560217847965?download=1080p"
type="video/mp4">

</video>

<div class="overlay"></div>

<div class="glow"></div>

<header>

<div class="logo">
Ani<span>Stream</span>
</div>

<nav>

<input type="text" class="search" placeholder="Search anime...">

<button class="nav-btn">Browse</button>
<button class="nav-btn">Recent</button>
<button class="nav-btn">Top</button>
<button class="nav-btn">Random</button>
<button class="nav-btn">Schedule</button>

</nav>

</header>

<section class="main">

<div class="content">

<div class="tag">
🔥 #1 GLOBAL TRENDING
</div>

<div class="title">
DEMON<br>
SLAYER
</div>

<div class="meta">

<span>SUB/DUB</span>
<span>2026</span>
<span>24 mins</span>
<span>13 Episodes</span>
<span>★ 9.9</span>

</div>

<div class="desc">

Enter the Infinity Castle arc with a cinematic ultra-HD anime streaming experience inspired by premium next-generation anime platforms.

</div>

<div class="buttons">

<button class="watch-btn" onclick="openPlayer()">
▶ WATCH NOW
</button>

＋ MY LIST
</button>

</div>

</div>

<div class="cards">

<div class="card">

<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">

<div class="number">
01
</div>

<div class="card-title">
Demon Slayer
</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop">

<div class="number">
02
</div>

<div class="card-title">
Attack on Titan
</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?q=80&w=1200&auto=format&fit=crop">

<div class="number">
03
</div>

<div class="card-title">
Solo Leveling
</div>

</div>

</div>

</section>

<script>

function openPlayer(){

window.location.href="player.html";

}

</script>

</body>

</html>
