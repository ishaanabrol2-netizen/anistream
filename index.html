<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniStream Infinity</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* =========================
BACKGROUND VIDEO
========================= */

.bg-video{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

z-index:-10;

filter:
brightness(0.25)
contrast(1.1)
saturate(1.2);

transform:scale(1.08);

}

/* =========================
OVERLAY
========================= */

.overlay{

position:fixed;
inset:0;

background:

linear-gradient(
to right,
rgba(0,0,0,0.95),
rgba(0,0,0,0.7),
rgba(0,0,0,0.3)
),

linear-gradient(
to top,
rgba(0,0,0,1),
transparent 40%
);

z-index:-9;

}

/* =========================
GLOW
========================= */

.glow1{

position:fixed;

width:700px;
height:700px;

background:#ff7a00;

right:-200px;
top:-200px;

filter:blur(220px);

opacity:0.12;

border-radius:50%;

z-index:-8;

}

/* =========================
LOGO
========================= */

.logo{

position:fixed;

top:30px;
left:50px;

font-size:58px;
font-weight:800;

letter-spacing:-2px;

z-index:500;

}

.logo span{
color:#ff7a00;
}

/* =========================
TOPBAR
========================= */

.topbar{

position:fixed;

top:0;
right:0;
left:0;

padding:28px 40px;

display:flex;
justify-content:flex-end;
align-items:center;

z-index:300;

}

.nav-right{

display:flex;
align-items:center;
gap:12px;

}

/* =========================
SEARCH
========================= */

.search{

width:260px;

padding:14px 18px;

border:none;
outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.04);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.06);

color:white;

}

/* =========================
BUTTON
========================= */

.nav-btn{

padding:13px 20px;

border-radius:18px;

background:
rgba(255,255,255,0.04);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.06);

color:white;

font-size:14px;

cursor:pointer;

transition:0.3s ease;

}

.nav-btn:hover{

background:
rgba(255,255,255,0.08);

}

/* =========================
HERO
========================= */

.hero{

height:100vh;

padding:
140px 60px 40px;

position:relative;

}

/* =========================
CONTENT
========================= */

.hero-content{

max-width:700px;

margin-bottom:70px;

}

/* =========================
TITLE
========================= */

.hero h1{

font-size:110px;

line-height:0.9;

font-weight:800;

letter-spacing:-5px;

margin-bottom:24px;

text-shadow:
0 10px 50px rgba(0,0,0,0.8);

}

/* =========================
META
========================= */

.meta{

display:flex;
gap:14px;
flex-wrap:wrap;

margin-bottom:24px;

}

.meta span{

padding:9px 15px;

border-radius:14px;

background:
rgba(255,255,255,0.04);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.06);

font-size:13px;

color:#ddd;

}

/* =========================
DESCRIPTION
========================= */

.desc{

font-size:18px;
line-height:2;

color:#ddd;

max-width:650px;

}

/* =========================
BUTTONS
========================= */

.buttons{

display:flex;
gap:16px;

margin-top:38px;

}

.watch-btn{

padding:18px 42px;

border:none;
border-radius:22px;

background:
linear-gradient(
135deg,
rgba(255,122,0,0.4),
rgba(255,122,0,0.22)
);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,122,0,0.3);

font-size:18px;
font-weight:700;

color:white;

cursor:pointer;

transition:0.3s ease;

}

.watch-btn:hover{

transform:translateY(-4px);

}

/* =========================
BOTTOM POSTER ROW
========================= */

.poster-section{

position:absolute;

bottom:30px;
left:60px;
right:60px;

}

/* TITLE */

.section-title{

font-size:26px;
font-weight:700;

margin-bottom:22px;

}

/* GRID */

.anime-row{

display:flex;
gap:22px;

overflow-x:auto;

padding-bottom:10px;

}

.anime-row::-webkit-scrollbar{
height:6px;
}

.anime-row::-webkit-scrollbar-thumb{

background:
rgba(255,255,255,0.2);

border-radius:20px;

}

/* =========================
CARD
========================= */

.card{

min-width:240px;
height:340px;

border-radius:28px;

overflow:hidden;

position:relative;

cursor:pointer;

background:
rgba(255,255,255,0.03);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.06);

transition:0.35s ease;

flex-shrink:0;

}

/* HOVER */

.card:hover{

transform:
translateY(-8px)
scale(1.02);

border-color:
rgba(255,255,255,0.18);

box-shadow:
0 18px 45px rgba(0,0,0,0.45);

}

/* IMAGE */

.card img{

width:100%;
height:100%;

object-fit:cover;

transition:
transform 0.4s ease;

}

.card:hover img{

transform:scale(1.05);

}

/* OVERLAY */

.card::after{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,0.96),
transparent 60%
);

}

/* INFO */

.card-info{

position:absolute;

left:18px;
bottom:18px;

z-index:5;

width:85%;

}

.card-info h3{

font-size:18px;

line-height:1.3;

margin-bottom:6px;

}

.card-info p{

font-size:13px;

color:#ddd;

}

/* PLAY BUTTON */

.play-btn{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

width:70px;
height:70px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(0,0,0,0.45);

backdrop-filter:blur(18px);

font-size:28px;

z-index:8;

opacity:0;

transition:0.3s ease;

}

.card:hover .play-btn{

opacity:1;

}

/* TRAILER MODAL */

.trailer-modal{

position:fixed;
inset:0;

background:
rgba(0,0,0,0.92);

display:none;

justify-content:center;
align-items:center;

z-index:9999;

}

/* VIDEO BOX */

.video-box{

width:80%;
height:80%;

border-radius:24px;

overflow:hidden;

background:black;

position:relative;

}

/* IFRAME */

.video-box iframe{

width:100%;
height:100%;

border:none;

}

/* CLOSE */

.close-btn{

position:absolute;

top:20px;
right:20px;

width:50px;
height:50px;

border-radius:50%;

background:
rgba(255,255,255,0.1);

display:flex;
justify-content:center;
align-items:center;

font-size:24px;

cursor:pointer;

z-index:10;

}

/* MOBILE */

@media(max-width:1000px){

.hero{

padding:120px 20px 20px;

}

.hero h1{
font-size:62px;
}

.poster-section{

left:20px;
right:20px;

}

.card{

min-width:180px;
height:260px;

}

.logo{

left:20px;
top:20px;

font-size:42px;

}

.topbar{

padding:20px;

}

.search{
display:none;
}

.nav-btn{
display:none;
}

.video-box{

width:95%;
height:60%;

}

}

</style>

</head>

<body>

<!-- BACKGROUND VIDEO -->

<video autoplay muted loop class="bg-video">

<source
src="https://cdn.coverr.co/videos/coverr-clouds-and-sunset-1560083032732?download=1080p"
type="video/mp4">

</video>

<div class="overlay"></div>

<div class="glow1"></div>

<!-- LOGO -->

<div class="logo">
Ani<span>Stream</span>
</div>

<!-- TOPBAR -->

<div class="topbar">

<div class="nav-right">

<input
type="text"
class="search"
placeholder="Search anime...">

<button class="nav-btn">
Trending
</button>

<button class="nav-btn">
Top Rated
</button>

<button class="nav-btn">
Movies
</button>

</div>

</div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>
Anime<br>
Universe
</h1>

<div class="meta">

<span>HD</span>
<span>SUB/DUB</span>
<span>Unlimited Anime</span>

</div>

<div class="desc">

A cinematic anime streaming platform with real auto-updating anime posters, built-in trailers, glassmorphism UI, premium hover effects, and modern Netflix-inspired aesthetics.

</div>

<div class="buttons">

<button class="watch-btn">
▶ Explore Anime
</button>

</div>

</div>

<!-- POSTERS AT BOTTOM -->

<div class="poster-section">

<div class="section-title">
Trending Anime
</div>

<div class="anime-row" id="animeRow">

</div>

</div>

</section>

<!-- TRAILER MODAL -->

<div class="trailer-modal" id="trailerModal">

<div class="video-box">

<div class="close-btn" id="closeBtn">
✕
</div>

<iframe
id="trailerFrame"
allowfullscreen>

</iframe>

</div>

</div>

<!-- SCRIPT -->

<script>

const animeRow =
document.getElementById("animeRow");

const trailerModal =
document.getElementById("trailerModal");

const trailerFrame =
document.getElementById("trailerFrame");

const closeBtn =
document.getElementById("closeBtn");

/* FETCH TOP ANIME */

async function loadAnime(){

const response = await fetch(

"https://api.jikan.moe/v4/top/anime?limit=18"

);

const data = await response.json();

/* LOOP */

data.data.forEach((anime)=>{

const trailer =
anime.trailer?.embed_url || "";

const card =
document.createElement("div");

card.classList.add("card");

/* CARD */

card.innerHTML = `

<img src="${anime.images.jpg.large_image_url}">

<div class="play-btn">
▶
</div>

<div class="card-info">

<h3>
${anime.title}
</h3>

<p>
⭐ ${anime.score || "N/A"}
</p>

</div>

`;

/* PLAY TRAILER */

card.onclick = ()=>{

if(trailer){

trailerModal.style.display = "flex";

trailerFrame.src = trailer;

}

};

animeRow.appendChild(card);

});

}

loadAnime();

/* CLOSE */

closeBtn.onclick = ()=>{

trailerModal.style.display = "none";

trailerFrame.src = "";

};

</script>

</body>

</html>
