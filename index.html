<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniStream Infinity</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#000;
color:white;
overflow-x:hidden;

}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
width:7px;
}

::-webkit-scrollbar-thumb{
background:#ff7a00;
border-radius:20px;
}

/* =========================
TOP NAVBAR
========================= */

.topbar{

position:fixed;

top:14px;
left:14px;
right:14px;

height:56px;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 18px;

background:
rgba(0,0,0,0.78);

backdrop-filter:blur(16px);

border:
1px solid rgba(255,255,255,0.08);

border-radius:16px;

z-index:999;

}

.logo{

font-size:40px;
font-weight:900;

letter-spacing:-3px;

}

.logo span{
color:#ff7a00;
}

.nav{

display:flex;
align-items:center;
gap:12px;

}

.search-box{

display:flex;
align-items:center;

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

border-radius:12px;

overflow:hidden;

}

.search{

width:190px;

padding:12px 14px;

border:none;
outline:none;

background:transparent;

color:white;

}

.search::placeholder{
color:#999;
}

.search-btn{

padding:12px 14px;

border:none;

background:
linear-gradient(
135deg,
#7a1d1d,
#3d1111
);

color:white;

cursor:pointer;

font-weight:600;

}

.nav-btn{

padding:12px 16px;

border:none;

border-radius:12px;

background:
rgba(255,255,255,0.03);

border:
1px solid rgba(255,255,255,0.06);

color:white;

cursor:pointer;

transition:0.3s ease;

}

.nav-btn:hover{

background:
rgba(255,255,255,0.08);

transform:
translateY(-2px);

}

.avatar{

width:40px;
height:40px;

border-radius:50%;

overflow:hidden;

border:
2px solid rgba(255,255,255,0.1);

}

.avatar img{

width:100%;
height:100%;

object-fit:cover;

}

/* =========================
HERO SECTION
========================= */

.hero{

position:relative;

height:100vh;

overflow:hidden;

display:flex;
align-items:center;

padding:120px 90px 60px;

}

/* BACKDROP */

.hero-backdrop{

position:absolute;
inset:0;

width:100%;
height:100%;

object-fit:cover;

filter:
brightness(0.45);

transform:scale(1.03);

}

.hero-overlay{

position:absolute;
inset:0;

background:
linear-gradient(
to right,
rgba(0,0,0,0.95),
rgba(0,0,0,0.6),
transparent
);

z-index:1;

}

/* CONTENT */

.hero-content{

position:relative;
z-index:2;

max-width:700px;

}

.hero h1{

font-size:72px;

font-weight:700;

line-height:1.1;

margin-bottom:22px;

}

.meta{

display:flex;
align-items:center;
gap:12px;

flex-wrap:wrap;

margin-bottom:28px;

}

.meta span{

font-size:14px;
color:#ddd;

}

.orange{
color:#ff7a00;
}

.hero-desc{

font-size:18px;

line-height:1.9;

color:#d4d4d4;

max-width:620px;

margin-bottom:28px;

}

/* BUTTONS */

.buttons{

display:flex;
align-items:center;
gap:14px;

margin-bottom:22px;

}

.watch-btn{

padding:16px 28px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
#7e2929,
#5c1f1f
);

color:white;

font-weight:700;

cursor:pointer;

font-size:15px;

transition:0.3s ease;

}

.watch-btn:hover{

transform:
translateY(-4px);

}

.bookmark-btn{

width:54px;
height:54px;

border:none;

border-radius:14px;

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.08);

color:white;

font-size:20px;

cursor:pointer;

}

/* GENRES */

.genre-row{

display:flex;
gap:10px;

flex-wrap:wrap;

}

.genre{

padding:8px 14px;

border-radius:10px;

background:
rgba(255,255,255,0.06);

font-size:12px;

color:#ddd;

}

/* =========================
SLIDER THUMBS
========================= */

.slider{

position:absolute;

right:90px;
bottom:50px;

display:flex;
align-items:center;
gap:24px;

z-index:5;

}

.slide-card{

position:relative;

width:250px;
height:130px;

border-radius:18px;

overflow:hidden;

cursor:pointer;

border:
2px solid transparent;

transition:0.3s ease;

}

.slide-card.active{

border:
2px solid #ff7a00;

}

.slide-card:hover{

transform:
translateY(-5px);

}

.slide-card img{

width:100%;
height:100%;

object-fit:cover;

filter:
brightness(0.8);

}

.slide-number{

position:absolute;

left:14px;
bottom:10px;

font-size:42px;
font-weight:900;

z-index:3;

}

/* =========================
SECTIONS
========================= */

.section{

padding:30px 70px;

}

.section-header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:26px;

}

.section-title{

font-size:32px;
font-weight:700;

}

.view-more{

color:#bbb;

cursor:pointer;

font-size:14px;

}

/* =========================
ANIME GRID
========================= */

.anime-grid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(170px,1fr));

gap:22px;

}

/* =========================
CARD
========================= */

.card{

cursor:pointer;

transition:0.3s ease;

}

.card:hover{

transform:
translateY(-8px);

}

.poster{

position:relative;

height:250px;

border-radius:18px;

overflow:hidden;

margin-bottom:10px;

}

.poster img{

width:100%;
height:100%;

object-fit:cover;

transition:0.4s ease;

}

.card:hover img{

transform:scale(1.08);

}

.poster::after{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,0.95),
transparent 60%
);

}

.ep{

position:absolute;

bottom:10px;
right:10px;

padding:6px 10px;

border-radius:10px;

background:#111;

font-size:11px;
font-weight:700;

z-index:5;

}

.sub{

position:absolute;

top:10px;
left:10px;

padding:5px 8px;

border-radius:8px;

background:
rgba(255,255,255,0.12);

font-size:10px;

z-index:5;

}

.card-title{

font-size:14px;

font-weight:600;

line-height:1.5;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

margin-bottom:8px;

}

.card-meta{

display:flex;
justify-content:space-between;

font-size:11px;
color:#aaa;

}

/* =========================
TOP 10 SECTION
========================= */

.top-panel{

background:
rgba(255,255,255,0.03);

border:
1px solid rgba(255,255,255,0.05);

border-radius:24px;

padding:24px;

margin-top:20px;

}

.top-tabs{

display:flex;
gap:12px;

margin-bottom:28px;

}

.tab{

padding:12px 18px;

border-radius:12px;

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

cursor:pointer;

}

.tab.active{

background:
linear-gradient(
135deg,
#ff7a00,
#ff5500
);

}

.top-grid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(170px,1fr));

gap:22px;

}

.top-card{

position:relative;

}

.rank-badge{

position:absolute;

top:10px;
left:10px;

padding:6px 10px;

border-radius:10px;

background:#ffcc00;

color:black;

font-size:11px;
font-weight:800;

z-index:5;

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:1200px){

.hero{
padding:120px 40px 40px;
}

.slider{
right:40px;
}

.section{
padding:30px 40px;
}

}

@media(max-width:900px){

.hero{

height:auto;

padding:120px 20px 50px;

}

.hero h1{
font-size:48px;
}

.slider{

position:relative;

right:auto;
bottom:auto;

margin-top:40px;

flex-wrap:wrap;

}

.slide-card{

width:180px;
height:100px;

}

.topbar{

left:10px;
right:10px;

}

.search-box{
display:none;
}

.nav-btn{
display:none;
}

.section{
padding:24px 20px;
}

}

</style>

</head>

<body>

<!-- =========================
TOPBAR
========================= -->

<div class="topbar">

<div class="logo">
Ani<span>Stream</span>
</div>

<div class="nav">

<div class="search-box">

<input
type="text"
class="search"
id="searchInput"
placeholder="Search..."
>

<button class="search-btn">
Browse
</button>

</div>

<button class="nav-btn">
🕒 Recent
</button>

<button class="nav-btn">
📅 Schedule
</button>

<button class="nav-btn">
⭐ Top
</button>

<button class="nav-btn">
🎲 Random
</button>

<div class="avatar">

<img src="https://i.imgur.com/2DhmtJ4.png">

</div>

</div>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero">

<img
id="heroBackdrop"
class="hero-backdrop"
src=""
>

<div class="hero-overlay"></div>

<div class="hero-content">

<h1 id="heroTitle">
Loading...
</h1>

<div class="meta">

<span class="orange">
SUB
</span>

<span id="heroDuration">
24 mins
</span>

<span id="heroYear">
2025
</span>

<span id="heroEpisodes">
12 eps
</span>

<span id="heroScore">
82%
</span>

</div>

<p
class="hero-desc"
id="heroDesc">

Loading anime description...

</p>

<div class="buttons">

<button
class="watch-btn"
id="watchNow">

WATCH NOW

</button>

<button class="bookmark-btn">

🔖

</button>

</div>

<div
class="genre-row"
id="genreRow">

</div>

</div>

<!-- SLIDER -->

<div
class="slider"
id="slider">

</div>

</section>

<!-- =========================
LATEST UPDATES
========================= -->

<section class="section">

<div class="section-header">

<div class="section-title">
Latest Updates
</div>

<div class="view-more">
View More
</div>

</div>

<div
class="anime-grid"
id="latestGrid">

</div>

</section>

<!-- =========================
TOP TRENDING
========================= -->

<section class="section">

<div class="top-panel">

<div class="top-tabs">

<div class="tab active">
Top Trending
</div>

<div class="tab">
Upcoming
</div>

</div>

<div
class="top-grid"
id="topGrid">

</div>

</div>

</section>

<script>

/* =========================
ELEMENTS
========================= */

const heroBackdrop =
document.getElementById("heroBackdrop");

const heroTitle =
document.getElementById("heroTitle");

const heroDesc =
document.getElementById("heroDesc");

const heroDuration =
document.getElementById("heroDuration");

const heroYear =
document.getElementById("heroYear");

const heroEpisodes =
document.getElementById("heroEpisodes");

const heroScore =
document.getElementById("heroScore");

const genreRow =
document.getElementById("genreRow");

const latestGrid =
document.getElementById("latestGrid");

const topGrid =
document.getElementById("topGrid");

const slider =
document.getElementById("slider");

const watchNow =
document.getElementById("watchNow");

/* =========================
FEATURED ROTATION
========================= */

let featuredAnime = [];
let currentFeatured = 0;

/* =========================
CREATE CARD
========================= */

function createCard(anime){

const card =
document.createElement("div");

card.classList.add("card");

card.innerHTML = `

<div class="poster">

<img
loading="lazy"
src="${anime.images.jpg.large_image_url}"
>

<div class="sub">
SUB
</div>

<div class="ep">
EP ${anime.episodes || "??"}
</div>

</div>

<div class="card-title">
${anime.title}
</div>

<div class="card-meta">

<span>
${anime.type || "TV"}
</span>

<span>
⭐ ${anime.score || "N/A"}
</span>

</div>

`;

card.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

return card;

}

/* =========================
TOP CARD
========================= */

function createTopCard(anime,index){

const card =
document.createElement("div");

card.classList.add("top-card");

card.innerHTML = `

<div class="rank-badge">
#${index + 1}
</div>

${createCard(anime).innerHTML}

`;

card.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

return card;

}

/* =========================
UPDATE HERO
========================= */

function updateHero(){

const anime =
featuredAnime[currentFeatured];

heroBackdrop.src =
anime.images.jpg.large_image_url;

heroTitle.innerHTML =
anime.title;

heroDesc.innerHTML =
anime.synopsis
? anime.synopsis.slice(0,150) + "..."
: "No description available.";

heroDuration.innerHTML =
"24 mins";

heroYear.innerHTML =
anime.year || "2025";

heroEpisodes.innerHTML =
`${anime.episodes || "??"} eps`;

heroScore.innerHTML =
`${anime.score || "N/A"}%`;

genreRow.innerHTML = "";

anime.genres.slice(0,3).forEach((genre)=>{

const tag =
document.createElement("div");

tag.classList.add("genre");

tag.innerHTML =
genre.name;

genreRow.appendChild(tag);

});

watchNow.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

}

/* =========================
CREATE SLIDER
========================= */

function createSlider(){

slider.innerHTML = "";

featuredAnime.slice(0,3).forEach((anime,index)=>{

const slide =
document.createElement("div");

slide.classList.add("slide-card");

if(index === currentFeatured){

slide.classList.add("active");

}

slide.innerHTML = `

<img src="${anime.images.jpg.large_image_url}">

<div class="slide-number">
0${index + 1}
</div>

`;

slide.onclick = ()=>{

currentFeatured = index;

updateHero();

createSlider();

};

slider.appendChild(slide);

});

}

/* =========================
LOAD ANIME
========================= */

async function loadAnime(){

try{

const topRes = await fetch(
"https://api.jikan.moe/v4/top/anime?limit=20"
);

const topData =
await topRes.json();

featuredAnime =
topData.data.slice(0,3);

updateHero();

createSlider();

/* AUTO ROTATE */

setInterval(()=>{

currentFeatured++;

if(currentFeatured >= featuredAnime.length){

currentFeatured = 0;

}

updateHero();

createSlider();

},8000);

/* LATEST */

topData.data.slice(0,12).forEach((anime)=>{

latestGrid.appendChild(
createCard(anime)
);

});

/* TOP */

topData.data.slice(0,10).forEach((anime,index)=>{

topGrid.appendChild(
createTopCard(anime,index)
);

});

}catch(error){

console.log(error);

}

}

loadAnime();

/* =========================
SEARCH
========================= */

const searchInput =
document.getElementById("searchInput");

searchInput.addEventListener("keypress",(e)=>{

if(e.key === "Enter"){

const query =
searchInput.value.trim();

if(query){

window.location.href =
`https://myanimelist.net/anime.php?q=${query}`;

}

}

});

</script>

</body>

</html>
