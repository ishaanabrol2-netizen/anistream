<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AniStream Infinity
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- =========================
BACKGROUND
========================= -->

<video class="bg-video"
autoplay
muted
loop
playsinline>

<source
src="https://cdn.coverr.co/videos/coverr-anime-style-city-at-night-1561607401157?download=1080p"
type="video/mp4">

</video>

<div class="overlay"></div>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="mouse-glow"
id="mouseGlow"></div>

<!-- =========================
TOPBAR
========================= -->

<div class="topbar">

<div class="logo">
Ani<span>Stream</span>
</div>

<div class="nav">

<input
type="text"
class="search"
id="searchInput"
placeholder="Search anime..."
>

<button class="nav-btn">
Trending
</button>

<button class="nav-btn">
Movies
</button>

<button class="nav-btn">
Favorites
</button>

<button class="login-btn">
Login
</button>

</div>

</div>

<!-- =========================
SEARCH RESULTS
========================= -->

<div class="panel"
id="searchPanel"
style="
display:none;
margin:
100px 20px 0;
">

<div class="section-title">
🔍 Search Results
</div>

<div class="search-row"
id="searchResults">

</div>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero">

<div class="main-grid">

<!-- =========================
LEFT
========================= -->

<div class="left-content">

<div class="hero-content">

<div class="badge">
🔥 REAL-TIME ANIME STREAMING
</div>

<h1>
Anime<br>
Universe
</h1>

<p class="desc">

Real anime posters,
trailers,
airing schedules,
streaming previews,
search system,
and live trending anime
powered from real anime APIs.

</p>

<div class="live-box">

<div class="live-dot"></div>

<div id="watchingCount">
24,821 watching now
</div>

</div>

<div class="buttons">

<button class="watch-btn">
▶ Explore Anime
</button>

</div>

</div>

<!-- =========================
AIRING TODAY
========================= -->

<div class="panel">

<div class="section-title">
📅 Airing Today
</div>

<div class="airing-row"
id="airingRow">

</div>

</div>

<!-- =========================
TRENDING
========================= -->

<div class="panel">

<div class="section-title">
🎬 Trending Anime
</div>

<div class="anime-row"
id="animeRow">

</div>

</div>

</div>

<!-- =========================
RIGHT TRENDING
========================= -->

<div class="right-trending">

<div class="panel">

<div class="section-title">
🔥 Real-Time Trending
</div>

<div class="trending-list"
id="trendingList">

</div>

</div>

</div>

</div>

</section>

<!-- =========================
TRAILER MODAL
========================= -->

<div id="trailerModal"
style="
display:none;
position:fixed;
inset:0;
background:
rgba(0,0,0,0.92);
z-index:9999;
justify-content:center;
align-items:center;
padding:20px;
">

<div style="
position:relative;
width:90%;
max-width:1200px;
aspect-ratio:16/9;
">

<iframe
id="trailerFrame"
style="
width:100%;
height:100%;
border:none;
border-radius:24px;
"
allowfullscreen>

</iframe>

<button
id="closeBtn"
style="
position:absolute;
top:-60px;
right:0;
padding:14px 18px;
border:none;
border-radius:16px;
background:#ff7a00;
color:white;
font-weight:700;
cursor:pointer;
">

Close

</button>

</div>

</div>

<!-- =========================
SCRIPT
========================= -->

<script src="script.js"></script>

</body>

</html>
