<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniStream Infinity</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{

background:#050505;
color:white;
overflow-x:hidden;

background-image:
linear-gradient(rgba(0,0,0,0.82),rgba(0,0,0,0.92)),
url('https://images.alphacoders.com/135/1355127.jpeg');

background-size:cover;
background-position:center;
background-attachment:fixed;

}

/* =========================
TOPBAR
========================= */

.topbar{

position:fixed;

top:0;
left:0;
right:0;

padding:18px 24px;

display:flex;
justify-content:space-between;
align-items:center;

backdrop-filter:blur(10px);

background:
rgba(0,0,0,0.45);

border-bottom:
1px solid rgba(255,255,255,0.06);

z-index:999;

}

.logo{

font-size:38px;
font-weight:800;

letter-spacing:-2px;

}

.logo span{
color:#ff7a00;
}

.nav{

display:flex;
align-items:center;
gap:12px;

}

.search{

width:240px;

padding:13px 16px;

border:none;
outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.06);

color:white;

}

.search::placeholder{
color:#bbb;
}

.nav-btn{

padding:12px 18px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.05);

border:
1px solid rgba(255,255,255,0.06);

color:white;

cursor:pointer;

transition:0.3s ease;

}

.nav-btn:hover{

transform:
translateY(-3px);

background:
rgba(255,255,255,0.1);

}

.login-btn{

padding:12px 20px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#ff7a00,
#ff5500
);

color:white;

font-weight:700;

cursor:pointer;

transition:0.3s ease;

}

.login-btn:hover{

transform:
translateY(-3px)
scale(1.04);

}

/* =========================
HERO
========================= */

.hero{

padding:
120px 20px 40px;

display:grid;

grid-template-columns:
1fr 320px;

gap:20px;

}

/* =========================
LEFT
========================= */

.left{

display:flex;
flex-direction:column;
gap:20px;

}

.hero-content{

max-width:720px;

}

.badge{

display:inline-flex;
align-items:center;
gap:10px;

padding:10px 18px;

border-radius:30px;

background:
rgba(255,122,0,0.15);

border:
1px solid rgba(255,122,0,0.25);

margin-bottom:20px;

font-size:13px;
font-weight:700;

}

.hero h1{

font-size:90px;

line-height:0.9;

font-weight:800;

letter-spacing:-4px;

margin-bottom:20px;

}

.desc{

font-size:16px;

line-height:2;

color:#ddd;

max-width:650px;

}

.live-box{

display:flex;
align-items:center;
gap:12px;

margin-top:24px;

padding:12px 18px;

border-radius:18px;

background:
rgba(255,0,0,0.08);

border:
1px solid rgba(255,0,0,0.2);

width:max-content;

}

.live-dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff2d2d;

animation:pulse 1.2s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.5);
opacity:0.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

.buttons{

display:flex;
gap:14px;

margin-top:24px;

}

.watch-btn{

padding:15px 24px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#ff7a00,
#ff5500
);

color:white;

font-weight:700;

cursor:pointer;

transition:0.3s ease;

}

.watch-btn:hover{

transform:
translateY(-4px);

}

.secondary-btn{

padding:15px 24px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.06);

color:white;

cursor:pointer;

transition:0.3s ease;

}

.secondary-btn:hover{

transform:
translateY(-4px);

}

/* =========================
PANELS
========================= */

.panel{

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(10px);

border-radius:24px;

padding:18px;

overflow:hidden;

}

.section-title{

font-size:22px;
font-weight:700;

margin-bottom:16px;

}

/* =========================
ROWS
========================= */

.airing-row,
.anime-row,
.search-row{

display:flex;
gap:14px;

overflow-x:auto;

padding-bottom:10px;

scrollbar-width:none;

}

.airing-row::-webkit-scrollbar,
.anime-row::-webkit-scrollbar,
.search-row::-webkit-scrollbar{
display:none;
}

/* =========================
AIRING CARDS
========================= */

.airing-card{

min-width:180px;
height:95px;

display:flex;

border-radius:18px;

overflow:hidden;

background:
rgba(255,255,255,0.04);

cursor:pointer;

transition:0.3s ease;

}

.airing-card:hover{

transform:
translateY(-5px);

}

.airing-card img{

width:70px;
height:100%;

object-fit:cover;

}

.airing-details{

padding:10px;

}

.airing-details h3{

font-size:11px;

line-height:1.4;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.airing-details p{

font-size:10px;
color:#ccc;

margin-top:6px;

}

.ep-badge{

margin-top:8px;

padding:5px 8px;

border-radius:10px;

background:
rgba(255,122,0,0.15);

font-size:9px;
font-weight:700;

width:max-content;

}

/* =========================
ANIME CARD
========================= */

.card{

min-width:170px;
height:250px;

border-radius:24px;

overflow:hidden;

position:relative;

cursor:pointer;

flex-shrink:0;

transition:0.3s ease;

background:
rgba(255,255,255,0.04);

}

.card:hover{

transform:
translateY(-8px)
scale(1.03);

}

.card img{

width:100%;
height:100%;

object-fit:cover;

transition:0.4s ease;

}

.card:hover img{

transform:scale(1.08);

}

.card::after{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,0.96),
transparent 60%
);

}

.score{

position:absolute;

top:10px;
right:10px;

padding:5px 8px;

border-radius:12px;

background:
rgba(0,0,0,0.55);

font-size:10px;
font-weight:700;

z-index:5;

}

.love{

position:absolute;

top:10px;
left:10px;

padding:5px 8px;

border-radius:12px;

background:
rgba(255,0,80,0.18);

font-size:10px;
font-weight:700;

z-index:5;

}

.play-btn{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

width:48px;
height:48px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(0,0,0,0.45);

font-size:18px;

opacity:0;

z-index:5;

transition:0.3s ease;

}

.card:hover .play-btn{

opacity:1;

}

.card-info{

position:absolute;

left:12px;
bottom:12px;

z-index:5;

}

.card-info h3{

font-size:13px;

line-height:1.4;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.card-info p{

font-size:10px;
color:#ccc;

margin-top:3px;

}

/* =========================
RIGHT TRENDING
========================= */

.right{

position:sticky;

top:90px;

height:max-content;

}

.trending-list{

display:flex;
flex-direction:column;

gap:10px;

}

.trend-item{

display:flex;
align-items:center;

gap:10px;

padding:10px;

border-radius:18px;

background:
rgba(255,255,255,0.04);

cursor:pointer;

transition:0.3s ease;

}

.trend-item:hover{

transform:
translateX(5px);

background:
rgba(255,255,255,0.08);

}

.rank{

font-size:18px;
font-weight:800;

color:#ff7a00;

width:30px;

}

.trend-thumb{

width:48px;
height:62px;

border-radius:12px;

overflow:hidden;

flex-shrink:0;

}

.trend-thumb img{

width:100%;
height:100%;

object-fit:cover;

}

.trend-info{

flex:1;

overflow:hidden;

}

.trend-info h3{

font-size:10px;

line-height:1.4;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;

}

.trend-info p{

font-size:9px;
color:#ccc;

margin-top:4px;

}

/* =========================
SEARCH PANEL
========================= */

#searchPanel{

display:none;

margin:
20px;

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:1300px){

.hero{

grid-template-columns:
1fr;

}

.right{

position:relative;

top:0;

}

}

@media(max-width:900px){

.hero{

padding:
100px 12px 20px;

}

.hero h1{

font-size:58px;

}

.search{
display:none;
}

.nav-btn{
display:none;
}

.topbar{

padding:18px 12px;

}

}

</style>

</head>

<body>

<!-- =========================
TOPBAR
========================= -->

<div class="topbar">

<div class="logo">
Ani<span>Stream</span>
</div>

<div class="nav">

<input
type="text"
class="search"
id="searchInput"
placeholder="Search anime..."
>

<button class="nav-btn">
Trending
</button>

<button class="nav-btn">
Movies
</button>

<button class="nav-btn">
Favorites
</button>

<button class="login-btn">
Login
</button>

</div>

</div>

<!-- =========================
SEARCH RESULTS
========================= -->

<div class="panel"
id="searchPanel">

<div class="section-title">
🔍 Search Results
</div>

<div class="search-row"
id="searchResults">

</div>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero">

<!-- =========================
LEFT
========================= -->

<div class="left">

<div class="hero-content">

<div class="badge">
🔥 REAL-TIME ANIME STREAMING
</div>

<h1>
Anime<br>
Universe
</h1>

<p class="desc">

Real anime posters,
trailers,
airing schedules,
streaming previews,
search system,
and live trending anime
powered by real anime APIs.

</p>

<div class="live-box">

<div class="live-dot"></div>

<div id="watchingCount">
24,821 watching now
</div>

</div>

<div class="buttons">

<button class="watch-btn">
▶ Explore Anime
</button>

<button class="secondary-btn">
⭐ Trending Now
</button>

</div>

</div>

<!-- AIRING -->

<div class="panel">

<div class="section-title">
📅 Airing Today
</div>

<div class="airing-row"
id="airingRow">

</div>

</div>

<!-- TRENDING -->

<div class="panel">

<div class="section-title">
🎬 Trending Anime
</div>

<div class="anime-row"
id="animeRow">

</div>

</div>

</div>

<!-- =========================
RIGHT
========================= -->

<div class="right">

<div class="panel">

<div class="section-title">
🔥 Real-Time Trending
</div>

<div class="trending-list"
id="trendingList">

</div>

</div>

</div>

</section>

<script>

/* =========================
LIVE WATCHERS
========================= */

const watchingCount =
document.getElementById("watchingCount");

function updateWatching(){

const viewers =
Math.floor(
Math.random() * 10000
) + 20000;

watchingCount.innerHTML =
`${viewers.toLocaleString()} watching now`;

}

setInterval(updateWatching,10000);

/* =========================
ELEMENTS
========================= */

const animeRow =
document.getElementById("animeRow");

const airingRow =
document.getElementById("airingRow");

const trendingList =
document.getElementById("trendingList");

/* =========================
CREATE CARD
========================= */

function createAnimeCard(anime){

const loves =
Math.floor(
Math.random() * 900
) + 100;

const card =
document.createElement("div");

card.classList.add("card");

card.innerHTML = `

<img src="${anime.images.jpg.large_image_url}">

<div class="love">
❤️ ${loves}K
</div>

<div class="score">
⭐ ${anime.score || "N/A"}
</div>

<div class="play-btn">
▶
</div>

<div class="card-info">

<h3>
${anime.title}
</h3>

<p>
${anime.type || "TV"}
</p>

</div>

`;

card.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

return card;

}

/* =========================
LOAD ANIME
========================= */

async function loadAnime(){

const topRes = await fetch(
"https://api.jikan.moe/v4/top/anime?limit=10"
);

const topData = await topRes.json();

const airingRes = await fetch(
"https://api.jikan.moe/v4/seasons/now"
);

const airingData = await airingRes.json();

/* TRENDING */

topData.data.forEach((anime)=>{

animeRow.appendChild(
createAnimeCard(anime)
);

});

/* AIRING */

airingData.data.slice(0,6).forEach((anime)=>{

const card =
document.createElement("div");

card.classList.add("airing-card");

card.innerHTML = `

<img src="${anime.images.jpg.large_image_url}">

<div class="airing-details">

<h3>
${anime.title}
</h3>

<p>
${anime.broadcast?.time || "Today"}
</p>

<div class="ep-badge">

EP ${anime.episodes || "??"}

</div>

</div>

`;

card.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

airingRow.appendChild(card);

});

/* RIGHT TRENDING */

topData.data.forEach((anime,index)=>{

const item =
document.createElement("div");

item.classList.add("trend-item");

item.innerHTML = `

<div class="rank">
${String(index + 1).padStart(2,'0')}
</div>

<div class="trend-thumb">

<img src="${anime.images.jpg.large_image_url}">

</div>

<div class="trend-info">

<h3>
${anime.title}
</h3>

<p>
⭐ ${anime.score || "N/A"}
</p>

</div>

`;

item.onclick = ()=>{

window.location.href =
`watch.html?id=${anime.mal_id}`;

};

trendingList.appendChild(item);

});

}

loadAnime();

/* =========================
SEARCH
========================= */

const searchInput =
document.getElementById("searchInput");

const searchPanel =
document.getElementById("searchPanel");

const searchResults =
document.getElementById("searchResults");

searchInput.addEventListener("input",async()=>{

const query =
searchInput.value.trim();

if(query.length < 2){

searchPanel.style.display =
"none";

return;

}

const response = await fetch(
`https://api.jikan.moe/v4/anime?q=${query}&limit=8`
);

const data =
await response.json();

searchResults.innerHTML = "";

searchPanel.style.display =
"block";

data.data.forEach((anime)=>{

searchResults.appendChild(
createAnimeCard(anime)
);

});

});

</script>

</body>

</html>
