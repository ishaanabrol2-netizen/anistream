<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniStream Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f1a;
    color:white;
}

/* HEADER */

header{
    background:#151525;
    padding:15px 30px;
}

header a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

/* PLAYER */

.player-container{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

.video-box{
    width:100%;
    height:600px;
    background:black;
    border-radius:12px;
    overflow:hidden;
    position:relative;
}

.video-box video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PLAY BUTTON */

.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    border:none;
    border-radius:50%;
    background:#ff3c5f;
    color:white;
    font-size:34px;
    cursor:pointer;
    z-index:10;
    transition:0.3s;
}

.play-btn:hover{
    background:#ff5d7a;
    transform:translate(-50%,-50%) scale(1.08);
}

/* CONTROLS */

.controls{
    margin-top:20px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.control-btn{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#1c1c2e;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.control-btn:hover{
    background:#ff3c5f;
}

/* INFO */

.info{
    margin-top:25px;
}

.info h1{
    margin-bottom:10px;
    font-size:38px;
}

.info p{
    color:#bbb;
    font-size:18px;
}

/* EPISODES */

.episodes{
    margin-top:35px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.ep{
    background:#1c1c2e;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.ep:hover{
    background:#ff3c5f;
}

</style>
</head>

<body>

<header>

<a href="index.html">
← Back Home
</a>

</header>

<div class="player-container">

<div class="video-box">

<button class="play-btn" id="playBtn">
▶
</button>

<video id="videoPlayer">

<source
src="https://www.w3schools.com/html/mov_bbb.mp4"
type="video/mp4">

</video>

</div>

<div class="controls">

<button class="control-btn" onclick="rewindVideo()">
⏪ Back 10s
</button>

<button class="control-btn" onclick="forwardVideo()">
Forward 10s ⏩
</button>

<button class="control-btn" onclick="toggleMute()">
🔊 Mute
</button>

</div>

<div class="info">

<h1>Demon Slayer</h1>

<p>
Season 3 Episode 8
</p>

</div>

<div class="episodes">

<div class="ep">Episode 1</div>
<div class="ep">Episode 2</div>
<div class="ep">Episode 3</div>
<div class="ep">Episode 4</div>
<div class="ep">Episode 5</div>

</div>

</div>

<script>

const video = document.getElementById("videoPlayer");
const playBtn = document.getElementById("playBtn");

/* PLAY */

playBtn.addEventListener("click", () => {

    if(video.paused){

        video.play();
        playBtn.style.display = "none";

    }

});

/* SHOW BUTTON WHEN PAUSED */

video.addEventListener("pause", () => {

    playBtn.style.display = "block";

});

/* HIDE BUTTON WHEN PLAYING */

video.addEventListener("play", () => {

    playBtn.style.display = "none";

});

/* REWIND */

function rewindVideo(){

    video.currentTime -= 10;

}

/* FORWARD */

function forwardVideo(){

    video.currentTime += 10;

}

/* MUTE */

function toggleMute(){

    video.muted = !video.muted;

}

</script>

</body>
</html>
