<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniStream Watch</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#050505;
color:white;
overflow-x:hidden;

background-image:
linear-gradient(rgba(0,0,0,0.86),rgba(0,0,0,0.94)),
url('https://images.alphacoders.com/135/1355127.jpeg');

background-size:cover;
background-position:center;
background-attachment:fixed;

}

.topbar{

padding:20px 24px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:
1px solid rgba(255,255,255,0.06);

background:
rgba(0,0,0,0.45);

backdrop-filter:blur(10px);

position:sticky;
top:0;

z-index:999;

}

.logo{

font-size:38px;
font-weight:800;

letter-spacing:-2px;

}

.logo span{
color:#ff7a00;
}

.main{

padding:24px;

display:grid;

grid-template-columns:
1fr 340px;

gap:20px;

}

.left{

display:flex;
flex-direction:column;
gap:20px;

}

.player-box{

width:100%;
height:72vh;

border-radius:26px;

overflow:hidden;

background:black;

border:
1px solid rgba(255,255,255,0.06);

}

.player-box iframe{

width:100%;
height:100%;

border:none;

}

.live-box{

display:flex;
align-items:center;
gap:12px;

margin-bottom:16px;

padding:12px 18px;

border-radius:18px;

background:
rgba(255,0,0,0.08);

border:
1px solid rgba(255,0,0,0.2);

width:max-content;

}

.live-dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff2d2d;

animation:pulse 1.2s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.5);
}

100%{
transform:scale(1);
}

}

.controls{

display:flex;
flex-wrap:wrap;
gap:12px;

}

.control-btn{

padding:14px 18px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.05);

border:
1px solid rgba(255,255,255,0.06);

color:white;

cursor:pointer;

transition:0.3s ease;

}

.control-btn:hover{

transform:
translateY(-4px);

background:
rgba(255,255,255,0.1);

}

.panel{

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(10px);

border-radius:24px;

padding:20px;

}

.title{

font-size:58px;
font-weight:800;

line-height:1;

margin-bottom:18px;

}

.meta{

display:flex;
flex-wrap:wrap;
gap:10px;

margin-bottom:20px;

}

.meta-item{

padding:10px 14px;

border-radius:14px;

background:
rgba(255,255,255,0.06);

font-size:13px;

}

.desc{

font-size:15px;

line-height:2;

color:#ddd;

}

.genre-list{

display:flex;
flex-wrap:wrap;
gap:10px;

margin-top:20px;

}

.genre{

padding:10px 14px;

border-radius:14px;

background:
rgba(255,122,0,0.14);

border:
1px solid rgba(255,122,0,0.2);

font-size:12px;

}

.section-title{

font-size:22px;
font-weight:700;

margin-bottom:16px;

}

.episode-list{

display:flex;
flex-direction:column;

gap:12px;

max-height:900px;

overflow-y:auto;

padding-right:6px;

}

.episode{

padding:14px;

border-radius:18px;

background:
rgba(255,255,255,0.04);

cursor:pointer;

transition:0.3s ease;

}

.episode:hover{

transform:
translateX(6px);

background:
rgba(255,255,255,0.08);

}

.recommend-row{

display:flex;
gap:14px;

overflow-x:auto;

padding-bottom:10px;

scrollbar-width:none;

}

.recommend-row::-webkit-scrollbar{
display:none;
}

.card{

min-width:170px;
height:250px;

border-radius:22px;

overflow:hidden;

position:relative;

cursor:pointer;

}

.card img{

width:100%;
height:100%;

object-fit:cover;

}

.card::after{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,0.95),
transparent 60%
);

}

.card-info{

position:absolute;

left:12px;
bottom:12px;

z-index:5;

}

.card-info h3{

font-size:13px;

line-height:1.4;

}

@media(max-width:1200px){

.main{

grid-template-columns:
1fr;

}

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
Ani<span>Stream</span>
</div>

</div>

<div class="main">

<div class="left">

<div class="player-box">

<iframe
id="player"
allowfullscreen>
</iframe>

</div>

<div class="controls">

<button class="control-btn">
▶ Auto Next
</button>

<button class="control-btn">
🌙 Cinema Mode
</button>

<button class="control-btn">
🔊 Dub/Sub
</button>

<button class="control-btn">
🔥 1080P
</button>

<button class="control-btn">
📥 Download
</button>

<button class="control-btn">
💗 Add To List
</button>

</div>

<div class="panel">

<div class="live-box">

<div class="live-dot"></div>

<div id="watchingCount">
24,921 watching now
</div>

</div>

<h1 class="title" id="title">
Loading...
</h1>

<div class="meta" id="meta"></div>

<p class="desc" id="description"></p>

<div class="genre-list" id="genres"></div>

</div>

<div class="panel">

<div class="section-title">
🎬 Recommended Anime
</div>

<div class="recommend-row"
id="recommendations">

</div>

</div>

</div>

<div class="panel">

<div class="section-title">
📺 Episodes
</div>

<div class="episode-list"
id="episodes">

</div>

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const animeId =
params.get("id") || "5114";

const player =
document.getElementById("player");

const title =
document.getElementById("title");

const description =
document.getElementById("description");

const meta =
document.getElementById("meta");

const genres =
document.getElementById("genres");

const episodes =
document.getElementById("episodes");

const recommendations =
document.getElementById("recommendations");

/* LIVE WATCHERS */

const watchingCount =
document.getElementById("watchingCount");

function updateWatching(){

const viewers =
Math.floor(
Math.random() * 10000
) + 20000;

watchingCount.innerHTML =
`${viewers.toLocaleString()} watching now`;

}

setInterval(updateWatching,10000);

/* LOAD */

async function loadAnime(){

try{

const response = await fetch(
`https://api.jikan.moe/v4/anime/${animeId}/full`
);

const data =
await response.json();

const anime =
data.data;

/* TITLE */

title.innerHTML =
anime.title;

/* DESCRIPTION */

description.innerHTML =
anime.synopsis ||
"No description available.";

/* META */

meta.innerHTML = `

<div class="meta-item">
⭐ ${anime.score || "N/A"}
</div>

<div class="meta-item">
📺 ${anime.episodes || "??"} Episodes
</div>

<div class="meta-item">
🎞 ${anime.type || "TV"}
</div>

<div class="meta-item">
📅 ${anime.year || "Unknown"}
</div>

`;

/* GENRES */

genres.innerHTML = "";

anime.genres.forEach((genre)=>{

genres.innerHTML += `

<div class="genre">
${genre.name}
</div>

`;

});

/* PLAYER */

if(
anime.trailer &&
anime.trailer.embed_url
){

player.src =
anime.trailer.embed_url;

}else{

player.src =
"https://www.youtube.com/embed/atxYe-nOa9w";

}

/* EPISODES */

episodes.innerHTML = "";

for(let i = 1; i <= 24; i++){

episodes.innerHTML += `

<div class="episode">

Episode ${i}

</div>

`;

}

/* RECOMMENDATIONS */

const recRes = await fetch(
`https://api.jikan.moe/v4/anime/${animeId}/recommendations`
);

const recData =
await recRes.json();

recommendations.innerHTML = "";

recData.data.slice(0,10).forEach((item)=>{

const anime =
item.entry;

recommendations.innerHTML += `

<div class="card"
onclick="
window.location.href=
'watch.html?id=${anime.mal_id}'
">

<img src="${anime.images.jpg.large_image_url}">

<div class="card-info">

<h3>
${anime.title}
</h3>

</div>

</div>

`;

});

}catch(error){

console.log(error);

title.innerHTML =
"Failed To Load Anime";

}

}

loadAnime();

</script>

</body>

</html>
